<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Antrenman">
<title>Antrenman Takip 5.6.1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--surface:#191919;--surface2:#222;--surface3:#2a2a2a;--border:#303030;
  --accent:#e8ff47;--orange:#ff7a45;--blue:#5aa7ff;--green:#4ade80;--red:#fb7185;
  --text:#f4f4f4;--muted:#939393;--dim:#5a5a5a;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:"SFMono-Regular",Consolas,"Liberation Mono",monospace;
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:var(--font);padding:calc(12px + var(--safe-top)) 12px calc(94px + var(--safe-bottom));min-height:100vh}
button,input,select,textarea{font:inherit}
button{touch-action:manipulation}
.wrap{max-width:560px;margin:auto}
.hidden{display:none!important}
.hdr{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:3px 0 12px;border-bottom:1px solid var(--border);margin-bottom:12px}
.brand{display:flex;align-items:center;gap:9px}.brand-mark{width:36px;height:36px;border-radius:10px;background:var(--accent);color:#111;display:grid;place-items:center;font-size:20px;font-weight:900}
.hdr-t{font-size:18px;font-weight:850;letter-spacing:-.02em}.hdr-s{font-size:11px;color:var(--muted);margin-top:2px}.version{font-size:9px;color:var(--dim);margin-left:5px}
.wsel{max-width:165px;background:rgba(232,255,71,.08);border:1px solid rgba(232,255,71,.6);color:var(--accent);padding:9px 10px;border-radius:9px;font-size:12px;font-weight:750}
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px}.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer}.tab.on{border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,.08)}
.page{display:none}.page.on{display:block}
.panel,.card,.mw,.wi,.si{background:var(--surface);border:1px solid var(--border);border-radius:12px}
.panel{padding:12px;margin-bottom:10px}
.sect{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin:16px 2px 8px}
.mode-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.mode-title{font-size:12px;font-weight:800}.mode-hint{font-size:10px;color:var(--muted)}
.mode-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.mode-btn{padding:10px 5px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;font-weight:750}.mode-btn.on{border-color:var(--accent);color:#111;background:var(--accent)}
.mode-note{font-size:10px;line-height:1.45;color:var(--muted);margin-top:8px}
.cockpit{padding:13px;background:linear-gradient(145deg,rgba(232,255,71,.10),rgba(90,167,255,.05));border:1px solid rgba(232,255,71,.28);border-radius:13px;margin-bottom:10px}
.cock-top{display:flex;justify-content:space-between;gap:10px}.cock-label{font-size:10px;text-transform:uppercase;color:var(--muted)}.cock-name{font-size:17px;font-weight:850;margin-top:3px}.cock-sub{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.35}
.ring{min-width:56px;height:56px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--accent) var(--p,0%),var(--surface3) 0);position:relative}.ring:after{content:"";position:absolute;width:44px;height:44px;border-radius:50%;background:var(--surface)}.ring span{position:relative;z-index:1;font-family:var(--mono);font-size:11px;font-weight:800;color:var(--accent)}
.cock-actions{display:grid;grid-template-columns:1fr auto;gap:7px;margin-top:11px}.big-action{border:0;border-radius:9px;padding:12px;background:var(--accent);color:#111;font-size:12px;font-weight:850}.small-action{border:1px solid var(--border);border-radius:9px;padding:10px 12px;background:var(--surface2);color:var(--text);font-size:12px;font-weight:750}
.progress-track{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-top:10px}.progress-fill{height:100%;background:var(--accent);width:0%;transition:width .2s}
.timers{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.timer{padding:11px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:11px}.timer-l{font-size:9px;color:var(--muted);text-transform:uppercase}.timer-v{font:750 25px var(--mono);color:var(--accent);margin:4px 0 8px}.timer-actions{display:flex;justify-content:center;gap:5px}.mini-btn{padding:6px 9px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:6px;font-size:10px;font-weight:700}.rest-tools{display:flex;justify-content:center;gap:4px;margin-top:5px}
.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}.metric{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}.metric-n{font:800 18px var(--mono);color:var(--accent)}.metric-l{font-size:9px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;margin-bottom:10px;overflow:hidden}.ex-card.current{border-color:rgba(232,255,71,.65);box-shadow:0 0 0 1px rgba(232,255,71,.08)}.ex-card.done{border-color:rgba(74,222,128,.35)}.ex-card.skipped{opacity:.52}
.ex-head{display:flex;gap:9px;padding:12px}.ex-num{width:28px;height:28px;flex:0 0 28px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--muted)}.ex-card.done .ex-num{background:var(--green);color:#111;border-color:var(--green)}
.ex-info{min-width:0;flex:1}.ex-name{font-size:13px;font-weight:800}.ex-note{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.35}.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}.tag{font-size:9px;padding:3px 6px;border-radius:999px;border:1px solid var(--border);color:var(--muted);background:var(--surface2)}.tag.accent{color:var(--accent);border-color:rgba(232,255,71,.3);background:rgba(232,255,71,.06)}.tag.blue{color:var(--blue);border-color:rgba(90,167,255,.3)}.tag.green{color:var(--green);border-color:rgba(74,222,128,.3)}.tag.orange{color:var(--orange);border-color:rgba(255,122,69,.3)}
.ex-side{text-align:right;flex:0 0 auto}.ex-side-n{font:800 17px var(--mono);color:var(--green)}.ex-side-l{font-size:9px;color:var(--muted)}
.advice{margin:0 12px 9px;padding:8px 9px;border-radius:8px;background:rgba(90,167,255,.07);border:1px solid rgba(90,167,255,.18);font-size:10px;color:#b9d9ff;line-height:1.4}.advice strong{color:var(--blue)}
.set-labels,.set-row{display:grid;grid-template-columns:34px minmax(62px,1fr) minmax(55px,.8fr) 60px 42px;gap:5px;align-items:center}.set-labels{padding:0 12px 4px;font-size:8px;color:var(--muted);text-transform:uppercase;text-align:center}.set-row{padding:0 12px 7px}.set-no{font-size:10px;color:var(--muted);text-align:center}.set-input,.rir{width:100%;min-width:0;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:9px 5px;font-size:12px;font-weight:750;text-align:center}.set-input:focus,.rir:focus{outline:none;border-color:var(--accent)}.set-done{width:42px;height:38px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-weight:900}.set-done.on{background:var(--green);border-color:var(--green);color:#111}.set-row.done .set-input,.set-row.done .rir{border-color:rgba(74,222,128,.25)}
.ex-footer{display:flex;justify-content:space-between;gap:6px;padding:5px 12px 12px}.text-btn{background:none;border:0;color:var(--accent);font-size:10px;font-weight:700;padding:4px}.text-btn.muted{color:var(--muted)}
.finish{width:100%;border:0;border-radius:11px;padding:15px;background:var(--accent);color:#111;font-size:14px;font-weight:900;margin-top:8px}
.empty{text-align:center;padding:35px 14px;color:var(--muted);font-size:12px;line-height:1.5}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px;text-align:center}.sum-n{font:850 21px var(--mono);color:var(--accent)}.sum-l{font-size:9px;color:var(--muted);text-transform:uppercase;margin-top:3px}
.week-goal{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}.week-goal strong{font-size:13px}.week-goal span{font-size:10px;color:var(--muted)}
.bar{height:7px;background:var(--surface3);border-radius:99px;overflow:hidden}.bar>i{display:block;height:100%;background:var(--accent);border-radius:99px}
.insight{padding:10px;border-bottom:1px solid var(--border);font-size:11px;line-height:1.45}.insight:last-child{border-bottom:0}.insight b{color:var(--accent)}
.muscle-row{display:grid;grid-template-columns:75px 1fr 34px;gap:8px;align-items:center;padding:5px 0}.muscle-name{font-size:10px;color:var(--muted)}.muscle-count{font:700 10px var(--mono);text-align:right}.muscle-bar{height:6px;background:var(--surface3);border-radius:99px;overflow:hidden}.muscle-bar i{display:block;height:100%;background:var(--blue)}
.wi{padding:11px;margin-bottom:8px}.wi-top{display:flex;justify-content:space-between;gap:8px}.wi-title{font-size:12px;font-weight:800;color:var(--accent)}.wi-meta{font-size:10px;color:var(--muted);text-align:right}.wi-body{font-size:10px;color:var(--muted);line-height:1.55;margin-top:7px}.log-ex{padding:6px 0;border-top:1px solid var(--border)}.log-ex:first-child{border-top:0}.log-ex strong{color:var(--text)}
.pr{display:flex;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:10px}.pr:last-child{border-bottom:0}.pr strong{color:var(--accent)}
.chart{height:120px;width:100%;overflow:hidden}.chart svg{width:100%;height:100%}.chart-label{font-size:9px;color:var(--muted);margin-top:6px;text-align:center}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}.field{margin-bottom:9px}.field label{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}.inp{width:100%;padding:10px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px}.inp:focus{outline:none;border-color:var(--accent)}textarea.inp{min-height:75px;resize:vertical}
.btn-row{display:flex;gap:7px}.btn{border:0;border-radius:8px;padding:11px 12px;font-size:11px;font-weight:800;cursor:pointer}.btn.primary{background:var(--accent);color:#111}.btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn.danger{background:rgba(251,113,133,.09);color:var(--red);border:1px solid rgba(251,113,133,.25)}
.presets{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:9px}.preset{flex:0 0 auto;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:8px;padding:8px 10px;font-size:10px;font-weight:700}
.mw{padding:12px;margin-bottom:9px}.mw.active{border-color:rgba(232,255,71,.55)}.mw-head{display:flex;justify-content:space-between;gap:8px;align-items:center}.mw-name{font-size:13px;font-weight:850}.mw-actions{display:flex;gap:4px}.icon-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);color:var(--text);font-size:12px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation}.icon-btn:active{transform:scale(.95)}.icon-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}.icon-btn.danger{color:var(--red)}.mex{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}.mex:last-of-type{border-bottom:0}.mex-name{font-size:11px;font-weight:750}.mex-meta{font-size:9px;color:var(--muted);margin-top:2px}.addex{width:100%;padding:10px;margin-top:8px;border:1px dashed var(--border);background:none;border-radius:8px;color:var(--accent);font-size:10px;font-weight:750}
.audit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.audit{padding:9px;background:var(--surface2);border-radius:8px;text-align:center}.audit strong{display:block;font:800 16px var(--mono);color:var(--accent)}.audit span{font-size:8px;color:var(--muted);text-transform:uppercase}
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:flex-end;justify-content:center;z-index:300}.ovl.open{display:flex}.modal{width:100%;max-width:560px;max-height:91vh;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:17px 17px 0 0;padding:16px calc(16px + env(safe-area-inset-right,0px)) calc(17px + var(--safe-bottom))}.modal-title{font-size:16px;font-weight:850;margin-bottom:13px}.modal-sub{font-size:11px;color:var(--muted);line-height:1.45;margin:-7px 0 13px}.modal-actions{display:flex;gap:7px;margin-top:13px}.modal-actions .btn{flex:1;padding:13px}
.summary-hero{text-align:center;padding:8px 0 14px}.summary-check{width:54px;height:54px;border-radius:50%;background:var(--green);color:#111;display:grid;place-items:center;font-size:28px;font-weight:900;margin:0 auto 9px}.summary-title{font-size:18px;font-weight:900}.summary-sub{font-size:11px;color:var(--muted);margin-top:4px}
.toast{position:fixed;left:50%;bottom:calc(84px + var(--safe-bottom));transform:translateX(-50%) translateY(20px);background:#f2f2f2;color:#111;padding:10px 13px;border-radius:8px;font-size:11px;font-weight:750;opacity:0;pointer-events:none;transition:.2s;z-index:500;max-width:90%;text-align:center}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.update-banner{display:none;background:var(--blue);color:#07111d;border-radius:9px;padding:9px 10px;margin-bottom:9px;font-size:10px;font-weight:750;justify-content:space-between;align-items:center;gap:7px}.update-banner.show{display:flex}.update-banner button{border:0;border-radius:6px;background:#fff;color:#111;padding:6px 8px;font-size:9px;font-weight:800}
.bottom{position:fixed;left:0;right:0;bottom:0;z-index:120;background:rgba(25,25,25,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:8px 12px calc(8px + var(--safe-bottom));display:flex;justify-content:center}.bottom-in{width:100%;max-width:560px;display:flex;justify-content:space-between;align-items:center;gap:10px}.bottom-label{font-size:9px;color:var(--muted)}.bottom-value{font-size:12px;font-weight:800;color:var(--accent);margin-top:2px}.bottom-btn{border:0;border-radius:8px;background:var(--accent);color:#111;padding:10px 13px;font-size:10px;font-weight:850}
.checkline{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}.checkline input{accent-color:var(--accent);width:17px;height:17px}
@media(max-width:390px){body{padding-left:9px;padding-right:9px}.set-labels,.set-row{grid-template-columns:30px minmax(56px,1fr) minmax(50px,.8fr) 54px 39px;gap:3px}.set-done{width:39px}.wsel{max-width:137px}.summary-strip{gap:4px}.metric{padding:8px 4px}.mode-btn{font-size:10px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="brand"><div class="brand-mark">M</div><div><div class="hdr-t">Antrenman <span class="version">v5.6.1</span></div><div class="hdr-s" id="dateText"></div></div></div>
    <select class="wsel" id="workoutSelect" aria-label="Antrenman seç"></select>
  </div>
  <div class="update-banner" id="updateBanner"><span>Yeni uygulama sürümü hazır.</span><button onclick="activateUpdate()">Yenile</button></div>
  <div class="tabs">
    <button class="tab on" data-tab="workout" onclick="showTab('workout')">Antrenman</button>
    <button class="tab" data-tab="history" onclick="showTab('history')">Geçmiş</button>
    <button class="tab" data-tab="analysis" onclick="showTab('analysis')">Analiz</button>
    <button class="tab" data-tab="cardio" onclick="showTab('cardio')">Kardiyo</button>
    <button class="tab" data-tab="manage" onclick="showTab('manage')">Yönet</button>
  </div>

  <main id="page-workout" class="page on">
    <div class="panel">
      <div class="mode-head"><div class="mode-title">Bugünün modu</div><div class="mode-hint">Programı kalıcı değiştirmez</div></div>
      <div class="mode-row">
        <button class="mode-btn" data-mode="normal" onclick="setWorkoutMode('normal')">Normal</button>
        <button class="mode-btn" data-mode="short" onclick="setWorkoutMode('short')">Kısa</button>
        <button class="mode-btn" data-mode="low" onclick="setWorkoutMode('low')">Düşük Enerji</button>
      </div>
      <div class="mode-note" id="modeNote"></div>
    </div>
    <div id="cockpit"></div>
    <div class="timers">
      <div class="timer">
        <div class="timer-l">Antrenman</div><div class="timer-v" id="workoutTime">0:00</div>
        <div class="timer-actions"><button class="mini-btn" onclick="toggleWorkoutTimer()">▶ / ⏸</button><button class="mini-btn" onclick="resetWorkoutTimer()">↺</button></div>
      </div>
      <div class="timer">
        <div class="timer-l">Dinlenme <span id="restTarget"></span></div><div class="timer-v" id="restTime">1:30</div>
        <div class="timer-actions"><button class="mini-btn" onclick="startRest()">Başla</button><button class="mini-btn" onclick="resetRest()">↺</button></div>
        <div class="rest-tools"><button class="mini-btn" onclick="addRest(15)">+15 sn</button><button class="mini-btn" onclick="addRest(-15)">−15 sn</button></div>
      </div>
    </div>
    <div class="summary-strip" id="liveSummary"></div>
    <div id="exerciseList"></div>
    <button class="finish" onclick="finishWorkout()">✓ Antrenmanı Tamamla</button>
  </main>

  <main id="page-history" class="page"><div id="historyContent"></div></main>
  <main id="page-analysis" class="page"><div id="analysisContent"></div></main>
  <main id="page-cardio" class="page"><div id="cardioContent"></div></main>
  <main id="page-manage" class="page"><div id="manageContent"></div></main>
</div>

<div class="bottom">
  <div class="bottom-in"><div><div class="bottom-label">Sıradaki antrenman</div><div class="bottom-value" id="nextWorkout">—</div></div><button class="bottom-btn" onclick="cycleWorkout()">Değiştir</button></div>
</div>

<div class="ovl" id="exerciseModal"><div class="modal">
  <div class="modal-title" id="exerciseModalTitle">Hareket Ekle</div>
  <div class="form-grid">
    <div class="field" style="grid-column:1/-1"><label>Hareket adı *</label><input class="inp" id="fName"></div>
    <div class="field" style="grid-column:1/-1"><label>Kas grupları — virgülle</label><input class="inp" id="fMuscles" placeholder="Göğüs, Triceps"></div>
    <div class="field"><label>Başlangıç ağırlığı</label><input class="inp" id="fWeight" type="number" inputmode="decimal"></div>
    <div class="field"><label>Set sayısı</label><input class="inp" id="fSets" type="number" inputmode="numeric"></div>
    <div class="field"><label>Tekrar alt sınır</label><input class="inp" id="fRepMin" type="number" inputmode="numeric"></div>
    <div class="field"><label>Tekrar üst sınır</label><input class="inp" id="fRepMax" type="number" inputmode="numeric"></div>
    <div class="field"><label>Hareket rolü</label><select class="inp" id="fType"><option value="main">Ana hareket</option><option value="accessory">Yardımcı</option><option value="core">Core / süre</option></select></div>
    <div class="field"><label>Artış adımı (kg)</label><input class="inp" id="fIncrement" type="number" inputmode="decimal"></div>
    <div class="field"><label>Dinlenme (sn)</label><input class="inp" id="fRest" type="number" inputmode="numeric"></div>
    <div class="field"><label>Set başı kcal — opsiyonel</label><input class="inp" id="fCal" type="number" inputmode="numeric"></div>
    <div class="field" style="grid-column:1/-1"><label>Video bağlantısı</label><input class="inp" id="fVideo"></div>
    <div class="field" style="grid-column:1/-1"><label>Not / alternatif</label><input class="inp" id="fNote"></div>
    <label class="checkline" style="grid-column:1/-1"><input type="checkbox" id="fOptional"> Kısa ve düşük enerji modunda atlanabilir</label>
  </div>
  <div class="modal-actions"><button class="btn ghost" onclick="closeExerciseModal()">Vazgeç</button><button class="btn primary" onclick="saveExerciseModal()">Kaydet</button></div>
</div></div>

<div class="ovl" id="actionModal"><div class="modal">
  <div class="modal-title" id="actionModalTitle">İşlem</div>
  <div class="modal-sub" id="actionModalMessage"></div>
  <div class="field" id="actionInputWrap" style="display:none"><label id="actionInputLabel">Yeni ad</label><input class="inp" id="actionModalInput" autocomplete="off"></div>
  <div class="modal-actions"><button class="btn ghost" type="button" onclick="closeActionModal()">Vazgeç</button><button class="btn primary" type="button" id="actionModalConfirm" onclick="confirmActionModal()">Kaydet</button></div>
</div></div>

<script>
"use strict";
const APP_VERSION="5.6.1";
const LS_STATE="fittrack_state_v2",LS_SESSION="fittrack_session_v2",LS_TIMER="fittrack_timer_v2";
const MODE_INFO={
  normal:{label:"Normal",note:"Tam program. Ana hareketlerde 1–3 tekrar cepte kalacak şekilde ilerle."},
  short:{label:"Kısa",note:"İlk temel hareketler korunur, setler azaltılır. Hedef: 25–35 dakikada çıkmak."},
  low:{label:"Düşük Enerji",note:"Minimum etkili doz. Ağırlığı zorlamadan, 3–4 RIR ile sadece zinciri koparmama günü."}
};
const DEFAULT_MET=4;
let state=null,session=null,currentTab="workout",modalCtx={workoutId:null,exerciseId:null};
let actionCtx={type:null,payload:null,onConfirm:null};
const ICONS={
 play:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>',
 edit:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4z"></path></svg>',
 trash:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v5M14 11v5"></path></svg>',
 up:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V5"></path><path d="M6 11l6-6 6 6"></path></svg>',
 down:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M18 13l-6 6-6-6"></path></svg>'
};
let workoutInterval=null,restInterval=null,wakeLock=null,pendingWorker=null;
let timer={wRunning:false,wBase:0,wStartTs:null,rRunning:false,rEndTs:null,rTarget:90};
const storage=(()=>{const mem={};try{const s=window["localStorage"];const probe="__fittrack_probe__";s.setItem(probe,"1");s.removeItem(probe);return s}catch{return{getItem:k=>Object.prototype.hasOwnProperty.call(mem,k)?mem[k]:null,setItem:(k,v)=>{mem[k]=String(v)},removeItem:k=>{delete mem[k]}}}})();

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function num(v,f=null){const n=parseFloat(v);return Number.isFinite(n)?n:f}
function int(v,f=0){const n=parseInt(v,10);return Number.isFinite(n)?n:f}
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function clamp(v,min,max){return Math.min(max,Math.max(min,v))}
function roundStep(v,step){if(!step)return Math.round(v*10)/10;return Math.round(v/step)*step}
function localISO(d=new Date()){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");return `${y}-${m}-${day}`}
function trDate(d=new Date()){return d.toLocaleDateString("tr-TR")}
function trTime(d=new Date()){return d.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})}
function parseDateValue(v,ts){if(ts)return new Date(ts);if(/^\d{4}-\d{2}-\d{2}$/.test(v||"")){const [y,m,d]=v.split("-").map(Number);return new Date(y,m-1,d)}const p=String(v||"").split(".").map(Number);if(p.length===3)return new Date(p[2],p[1]-1,p[0]);return new Date(0)}
function startOfWeek(){const d=new Date();const day=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-day);return d}
function safeParse(raw){try{return JSON.parse(raw)}catch{return null}}
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove("show"),2200)}
function confirmAction(msg){return window.confirm(msg)}
function openActionModal({title,message="",inputValue=null,inputLabel="Yeni ad",confirmText="Kaydet",danger=false,onConfirm}){
 actionCtx={type:inputValue===null?"confirm":"input",payload:null,onConfirm};
 document.getElementById("actionModalTitle").textContent=title;
 document.getElementById("actionModalMessage").textContent=message;
 const wrap=document.getElementById("actionInputWrap"),inp=document.getElementById("actionModalInput"),btn=document.getElementById("actionModalConfirm");
 wrap.style.display=inputValue===null?"none":"block";
 document.getElementById("actionInputLabel").textContent=inputLabel;
 inp.value=inputValue===null?"":inputValue;
 btn.textContent=confirmText;
 btn.className=`btn ${danger?"dngr":"primary"}`;
 document.getElementById("actionModal").classList.add("open");
 if(inputValue!==null)setTimeout(()=>{inp.focus();inp.select()},60);
}
function closeActionModal(){document.getElementById("actionModal").classList.remove("open");actionCtx={type:null,payload:null,onConfirm:null}}
function confirmActionModal(){
 if(typeof actionCtx.onConfirm!=="function"){closeActionModal();return}
 const value=actionCtx.type==="input"?document.getElementById("actionModalInput").value.trim():true;
 if(actionCtx.type==="input"&&!value){toast("Ad boş bırakılamaz.");return}
 const fn=actionCtx.onConfirm;closeActionModal();fn(value);
}

function seedDefaults(){
 const A=[
  ex("bench_press","Chest Press (Makine)",["Göğüs","Triceps"],3,8,10,20,"main",2.5,120,false,"Alt: Dumbbell bench press"),
  ex("lat_pulldown","Lat Pulldown",["Sırt","Biceps"],3,8,10,26,"main",2.5,120,false,"Geniş tutuş, önden çek"),
  ex("cable_row_a","Kablo Rowing",["Sırt","Biceps"],3,8,10,26,"main",2.5,120,false,"Gövdeyi savurma"),
  ex("biceps_curl_a","Dumbbell Biceps Curl",["Biceps"],3,10,15,7.5,"accessory",1,75,true,"Dirseği sabit tut"),
  ex("leg_press_a","Leg Press",["Bacak"],2,10,15,100,"main",5,120,false,"Alt vücut koruma dozu"),
  ex("plank_a","Plank",["Core"],3,30,45,0,"core",0,60,true,"Süreyi tekrar alanına gir")
 ];
 const B=[
  ex("incline_press","Incline Dumbbell Press",["Göğüs","Triceps"],3,8,10,16,"main",1,120,false,"Üst göğüs"),
  ex("shoulder_press","Dumbbell Omuz Press",["Omuz","Triceps"],3,8,10,14,"main",1,120,false,"Belini aşırı kavislendirme"),
  ex("lateral_raise","Lateral Raise",["Omuz"],3,12,15,8,"accessory",1,60,true,"Kontrollü kaldır"),
  ex("triceps_pushdown","Triceps Pushdown",["Triceps"],3,10,15,20,"accessory",2.5,75,true,"Dirsek sabit"),
  ex("hammer_curl","Hammer Curl",["Biceps","Ön Kol"],3,10,15,10,"accessory",1,75,true,"Çekiç tutuş"),
  ex("leg_curl","Leg Curl",["Bacak"],2,10,15,30,"accessory",2.5,90,false,"Hamstring"),
  ex("roman_chair","Roman Chair",["Alt Sırt","Kalça"],2,10,15,0,"accessory",2.5,75,true,"Kontrollü, nötr omurga"),
  ex("plank_b","Yan Plank",["Core"],2,20,40,0,"core",0,60,true,"Her iki taraf")
 ];
 const exercises={};[...A,...B].forEach(x=>exercises[x.id]=x);
 return {version:56,appVersion:APP_VERSION,workouts:[{id:"w_a",name:"Seans A",exerciseIds:A.map(x=>x.id)},{id:"w_b",name:"Seans B",exerciseIds:B.map(x=>x.id)}],exercises,logs:[],cardioLog:[],bodyWeightLog:[],settings:{activeWorkoutId:"w_a",bodyWeightKg:121.5,restSeconds:90,weeklyWorkoutTarget:4,weeklyCardioTarget:120,defaultMode:"normal",vibration:true,wakeLock:true}};
}
function ex(id,name,muscles,sets,repMin,repMax,weight,type,increment,restSec,optional,note=""){return{id,name,muscles,sets,repMin,repMax,reps:repMax,weight,type,increment,restSec,optional,note,calPerSet:null,video:""}}
function inferType(x){const n=(x.name||"").toLowerCase();if(n.includes("plank")||n.includes("core"))return"core";if(n.includes("curl")||n.includes("raise")||n.includes("pushdown")||n.includes("extension"))return"accessory";return"main"}
function inferRange(x){const r=int(x.reps,12),t=x.type||inferType(x);if(t==="core")return[Math.max(15,r),Math.max(30,r)];if(t==="main")return r<=10?[Math.max(6,r-2),Math.max(8,r)]:[8,10];return r>=15?[12,15]:[10,15]}
function migrateState(s){
 if(!s||!Array.isArray(s.workouts)||!s.exercises)return seedDefaults();
 s.logs=Array.isArray(s.logs)?s.logs:[];s.cardioLog=Array.isArray(s.cardioLog)?s.cardioLog:[];s.bodyWeightLog=Array.isArray(s.bodyWeightLog)?s.bodyWeightLog:[];s.settings=s.settings||{};
 if(!s.workouts.some(w=>w.id===s.settings.activeWorkoutId))s.settings.activeWorkoutId=s.workouts[0]?.id;
 s.settings.bodyWeightKg=num(s.settings.bodyWeightKg,121.5);s.settings.restSeconds=int(s.settings.restSeconds,90);s.settings.weeklyWorkoutTarget=int(s.settings.weeklyWorkoutTarget,4);s.settings.weeklyCardioTarget=int(s.settings.weeklyCardioTarget,120);s.settings.defaultMode=s.settings.defaultMode||"normal";s.settings.vibration=s.settings.vibration!==false;s.settings.wakeLock=s.settings.wakeLock!==false;
 Object.values(s.exercises).forEach((x,i)=>{x.id=x.id||uid();x.muscles=Array.isArray(x.muscles)?x.muscles:[];x.type=x.type||inferType(x);const rg=inferRange(x);x.repMin=int(x.repMin,rg[0]);x.repMax=int(x.repMax,rg[1]);x.reps=x.repMax;x.sets=clamp(int(x.sets,3),1,10);x.weight=num(x.weight,0);x.increment=num(x.increment,x.weight<=20?1:2.5);x.restSec=int(x.restSec,x.type==="main"?120:x.type==="core"?60:75);x.optional=typeof x.optional==="boolean"?x.optional:(x.type!=="main"&&i>2);x.note=x.note||"";x.video=x.video||"";x.calPerSet=num(x.calPerSet,null)});
 s.version=56;s.appVersion=APP_VERSION;return s;
}
function loadState(){const raw=storage.getItem(LS_STATE);if(raw){const parsed=safeParse(raw);if(parsed){if(parsed.version!==56||parsed.appVersion!==APP_VERSION)storage.setItem(`${LS_STATE}_surum_oncesi_${Date.now()}`,raw);state=migrateState(parsed);saveState();return}}state=seedDefaults();saveState()}
function saveState(){storage.setItem(LS_STATE,JSON.stringify(state))}
function activeWorkout(){return state.workouts.find(w=>w.id===state.settings.activeWorkoutId)||state.workouts[0]}
function nextWorkout(){const i=state.workouts.findIndex(w=>w.id===activeWorkout().id);return state.workouts[(i+1)%state.workouts.length]}
function workoutExercises(w=activeWorkout()){return(w.exerciseIds||[]).map(id=>state.exercises[id]).filter(Boolean)}

function loadSession(){const p=safeParse(storage.getItem(LS_SESSION));if(p&&p.workoutId===activeWorkout().id){session=p;session.mode=session.mode||state.settings.defaultMode||"normal";session.data=session.data||{};Object.entries(session.data).forEach(([id,e])=>migrateSessionEntry(id,e))}else resetSession()}
function migrateSessionEntry(id,e){const x=state.exercises[id];if(!x)return;e.sets=Array.isArray(e.sets)?e.sets:[];if(Array.isArray(e.setsDone)){for(let i=0;i<e.setsDone.length;i++)e.sets[i]=e.sets[i]||{done:!!e.setsDone[i],weight:num(e.weight,x.weight),reps:int(e.reps,x.repMin),rir:2}}e.note=e.note||""}
function resetSession(){session={workoutId:activeWorkout().id,mode:state.settings.defaultMode||"normal",data:{},createdAt:Date.now()};saveSession()}
function saveSession(){storage.setItem(LS_SESSION,JSON.stringify(session))}
function setWorkoutMode(mode){if(!MODE_INFO[mode])return;session.mode=mode;saveSession();renderWorkoutPage()}
function plannedExercises(){const all=workoutExercises();if(session.mode==="normal")return all;if(session.mode==="short")return all.filter((x,i)=>!x.optional||i<4).slice(0,5);return all.filter((x,i)=>!x.optional||i<3).slice(0,4)}
function plannedSets(ex){if(session.mode==="normal")return ex.sets;if(session.mode==="short")return Math.min(ex.sets,ex.type==="main"?2:1);return Math.min(ex.sets,ex.type==="main"?2:1)}
function latestEntry(exId,skip=0){let found=0;for(let i=state.logs.length-1;i>=0;i--){const e=state.logs[i].entries?.[exId];if(e){if(found===skip)return normalizeLogEntry(e,state.exercises[exId]);found++}}return null}
function normalizeLogEntry(e,x){if(Array.isArray(e.sets))return{...e,sets:e.sets.map(s=>({done:s.done!==false,weight:num(s.weight,num(e.weight,x?.weight||0)),reps:int(s.reps,int(e.reps,x?.repMin||0)),rir:num(s.rir,null)}))};const done=Array.isArray(e.setsDone)?e.setsDone:[];return{...e,sets:done.map(v=>({done:!!v,weight:num(e.weight,x?.weight||0),reps:int(e.reps,x?.repMin||0),rir:null}))}}
function progression(ex){const last=latestEntry(ex.id);if(!last)return{weight:ex.weight,status:"Başlangıç",text:`İlk kayıt. ${ex.repMin}–${ex.repMax} aralığında 1–3 RIR bırak.`};const sets=last.sets.filter(s=>s.done);if(!sets.length)return{weight:ex.weight,status:"Başlangıç",text:"Son kayıtta tamamlanmış set yok."};const lastWeight=num(sets[0].weight,ex.weight),allTop=sets.length>=Math.min(ex.sets,2)&&sets.every(s=>s.reps>=ex.repMax),below=sets.filter(s=>s.reps<ex.repMin).length>=Math.ceil(sets.length/2),rirs=sets.map(s=>s.rir).filter(v=>v!==null),avgRir=rirs.length?rirs.reduce((a,b)=>a+b,0)/rirs.length:null;const prev=latestEntry(ex.id,1);let target=lastWeight,status="Koru",text=`${lastWeight} kg ile devam et; önce tekrar aralığını doldur.`;
 if(allTop&&(avgRir===null||avgRir>=1)){target=roundStep(lastWeight+ex.increment,ex.increment);status="Artır";text=`Tüm setler üst sınıra ulaştı. ${target} kg dene.`}
 if(below||avgRir===0){status="Koru";text=`Tekrar alt sınırı zorlandı. ${lastWeight} kg ile kal.`;if(prev){const ps=normalizeLogEntry(prev,ex).sets.filter(s=>s.done);const prevBelow=ps.length&&ps.filter(s=>s.reps<ex.repMin).length>=Math.ceil(ps.length/2);if(prevBelow){target=Math.max(0,roundStep(lastWeight-ex.increment,ex.increment));status="Geri çek";text=`İki seanstır alt sınır zorlanıyor. ${target} kg ile temiz tekrar yap.`}}}
 if(session?.mode==="low"&&target>0){const low=roundStep(target*.95,ex.increment);return{weight:low,status:"Bugün hafif",text:`Düşük enerji modu: normal öneri ${target} kg, bugün ${low} kg yeterli.`}}
 return{weight:target,status,text};}
function defaultSet(ex,i){const last=latestEntry(ex.id),p=progression(ex);let reps=ex.repMin,weight=p.weight,rir=session.mode==="low"?3:2;if(last?.sets?.[i]){reps=clamp(int(last.sets[i].reps,ex.repMin),1,999);weight=p.weight}return{done:false,weight,reps,rir}}
function getSessionEntry(ex){const e=session.data[ex.id]||(session.data[ex.id]={sets:[],note:"",skipped:false});e.sets=Array.isArray(e.sets)?e.sets:[];return e}
function getSet(ex,i){const e=getSessionEntry(ex);if(!e.sets[i])e.sets[i]=defaultSet(ex,i);return e.sets[i]}
function updateSet(exId,i,field,value){const ex=state.exercises[exId];if(!ex)return;const s=getSet(ex,i);s[field]=field==="done"?!!value:num(value,s[field]);saveSession();if(field!=="done")renderLiveOnly()}
function toggleSet(exId,i){const ex=state.exercises[exId],s=getSet(ex,i);s.done=!s.done;if(s.done){if(!timer.wRunning&&workoutElapsed()===0)toggleWorkoutTimer();timer.rTarget=ex.restSec||state.settings.restSeconds;startRest(timer.rTarget);if(state.settings.vibration&&navigator.vibrate)navigator.vibrate(35)}saveSession();renderWorkoutPage()}
function skipExercise(exId){const ex=state.exercises[exId],e=getSessionEntry(ex);e.skipped=!e.skipped;saveSession();renderWorkoutPage();toast(e.skipped?`${ex.name} bugün atlandı`:`${ex.name} geri alındı`)}
function updateNote(exId,v){getSessionEntry(state.exercises[exId]).note=v;saveSession()}
function workoutCounts(){let done=0,total=0;plannedExercises().forEach(ex=>{const e=getSessionEntry(ex);if(e.skipped)return;const n=plannedSets(ex);total+=n;for(let i=0;i<n;i++)if(getSet(ex,i).done)done++});return{done,total}}
function currentExercise(){for(const ex of plannedExercises()){const e=getSessionEntry(ex);if(e.skipped)continue;for(let i=0;i<plannedSets(ex);i++)if(!getSet(ex,i).done)return{ex,i}}return null}
function setCalories(ex,s){if(ex.calPerSet)return ex.calPerSet;const duration=Math.max(20,s.reps*(ex.type==="core"?1:3));const met=ex.type==="main"?5:ex.type==="core"?4:3.5;return Math.max(1,Math.round(met*state.settings.bodyWeightKg*(duration/3600)*(1+num(s.weight,0)/250)))}
function liveTotals(){let sets=0,cal=0,volume=0;plannedExercises().forEach(ex=>{const e=getSessionEntry(ex);if(e.skipped)return;for(let i=0;i<plannedSets(ex);i++){const s=getSet(ex,i);if(s.done){sets++;cal+=setCalories(ex,s);if(s.weight>0)volume+=s.weight*s.reps}}});return{sets,cal,volume}}

function renderWorkoutPage(){
 document.querySelectorAll(".mode-btn").forEach(b=>b.classList.toggle("on",b.dataset.mode===session.mode));document.getElementById("modeNote").textContent=MODE_INFO[session.mode].note;
 const count=workoutCounts(),cur=currentExercise(),pct=count.total?Math.round(count.done/count.total*100):0;
 document.getElementById("cockpit").innerHTML=`<div class="cockpit"><div class="cock-top"><div><div class="cock-label">${cur?`Sıradaki · Set ${cur.i+1}`:"Bugünün programı"}</div><div class="cock-name">${cur?esc(cur.ex.name):"Tamamlandı 🎯"}</div><div class="cock-sub">${cur?esc(progression(cur.ex).text):"Kaydetmeye hazırsın."}</div></div><div class="ring" style="--p:${pct}%"><span>${pct}%</span></div></div><div class="cock-actions"><button class="big-action" onclick="completeNextSet()">${cur?"Sıradaki seti tamamla":"Antrenmanı kaydet"}</button><button class="small-action" onclick="scrollToCurrent()">Odaklan</button></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;
 const live=liveTotals();document.getElementById("liveSummary").innerHTML=`<div class="metric"><div class="metric-n">${live.sets}</div><div class="metric-l">Set</div></div><div class="metric"><div class="metric-n">${Math.round(live.volume)}</div><div class="metric-l">Hacim kg</div></div><div class="metric"><div class="metric-n">${live.cal}</div><div class="metric-l">Tahmini kcal</div></div>`;
 const currentId=cur?.ex.id;const list=document.getElementById("exerciseList");const exs=plannedExercises();list.innerHTML=exs.length?exs.map((x,i)=>exerciseHTML(x,i,currentId)).join(""):`<div class="empty">Bu antrenmanda hareket yok.</div>`;document.getElementById("nextWorkout").textContent=nextWorkout()?.name||"—";document.getElementById("restTarget").textContent=`(${timer.rTarget||state.settings.restSeconds} sn)`;renderLiveOnly();
}
function exerciseHTML(ex,index,currentId){const e=getSessionEntry(ex),n=plannedSets(ex),done=e.skipped?0:Array.from({length:n},(_,i)=>getSet(ex,i)).filter(s=>s.done).length,all=done===n&&!e.skipped,p=progression(ex),last=latestEntry(ex.id);let rows="";for(let i=0;i<n;i++){const s=getSet(ex,i),core=ex.type==="core";rows+=`<div class="set-row ${s.done?"done":""}"><div class="set-no">${i+1}</div>${core?`<div class="set-input" style="display:grid;place-items:center;color:var(--muted)">Vücut</div>`:`<input class="set-input" type="number" inputmode="decimal" value="${s.weight}" aria-label="Ağırlık" onchange="updateSet('${ex.id}',${i},'weight',this.value)">`}<input class="set-input" type="number" inputmode="numeric" value="${s.reps}" aria-label="${core?"Süre":"Tekrar"}" onchange="updateSet('${ex.id}',${i},'reps',this.value)"><select class="rir" aria-label="RIR" onchange="updateSet('${ex.id}',${i},'rir',this.value)">${[0,1,2,3,4].map(v=>`<option value="${v}" ${num(s.rir,2)===v?"selected":""}>${v}</option>`).join("")}</select><button class="set-done ${s.done?"on":""}" onclick="toggleSet('${ex.id}',${i})">${s.done?"✓":"○"}</button></div>`}
 const lastTxt=last?`${last.sets.filter(s=>s.done).length} set · ${last.sets[0]?.weight??"—"} kg`:"Kayıt yok";
 return `<section class="ex-card ${currentId===ex.id?"current":""} ${all?"done":""} ${e.skipped?"skipped":""}" id="ex-${ex.id}"><div class="ex-head"><div class="ex-num">${all?"✓":index+1}</div><div class="ex-info"><div class="ex-name">${esc(ex.name)}</div>${ex.note?`<div class="ex-note">${esc(ex.note)}</div>`:""}<div class="tags">${ex.muscles.map(m=>`<span class="tag accent">${esc(m)}</span>`).join("")}<span class="tag blue">${n}×${ex.repMin}–${ex.repMax}</span><span class="tag">${ex.restSec} sn</span>${ex.optional?`<span class="tag orange">Opsiyonel</span>`:""}</div></div><div class="ex-side"><div class="ex-side-n">${done}/${n}</div><div class="ex-side-l">set</div></div></div><div class="advice"><strong>${p.status}:</strong> ${esc(p.text)}<br><span style="color:var(--muted)">Son: ${esc(lastTxt)} · RIR = kaç tekrar daha kalırdı?</span></div><div class="set-labels"><span>Set</span><span>Kg</span><span>${ex.type==="core"?"Sn":"Tekrar"}</span><span>RIR</span><span></span></div>${rows}<div class="ex-footer"><div>${ex.video?`<a class="text-btn" href="${esc(ex.video)}" target="_blank" rel="noopener">▶ Form</a>`:""}<button class="text-btn muted" onclick="openExerciseModal('${activeWorkout().id}','${ex.id}')">✎ Düzenle</button></div><button class="text-btn muted" onclick="skipExercise('${ex.id}')">${e.skipped?"Geri al":"Bugün atla"}</button></div><div style="padding:0 12px 12px"><input class="inp" style="padding:8px;font-size:11px" placeholder="Seans notu..." value="${esc(e.note||"")}" onchange="updateNote('${ex.id}',this.value)"></div></section>`}
function renderLiveOnly(){const live=liveTotals();const el=document.getElementById("liveSummary");if(el)el.innerHTML=`<div class="metric"><div class="metric-n">${live.sets}</div><div class="metric-l">Set</div></div><div class="metric"><div class="metric-n">${Math.round(live.volume)}</div><div class="metric-l">Hacim kg</div></div><div class="metric"><div class="metric-n">${live.cal}</div><div class="metric-l">Tahmini kcal</div></div>`}
function completeNextSet(){const cur=currentExercise();if(!cur)return finishWorkout();const s=getSet(cur.ex,cur.i);s.done=true;if(!timer.wRunning&&workoutElapsed()===0)toggleWorkoutTimer();timer.rTarget=cur.ex.restSec||state.settings.restSeconds;startRest(timer.rTarget);saveSession();renderWorkoutPage()}
function scrollToCurrent(){const cur=currentExercise();if(cur)document.getElementById(`ex-${cur.ex.id}`)?.scrollIntoView({behavior:"smooth",block:"center"})}

function workoutElapsed(){return timer.wBase+((timer.wRunning&&timer.wStartTs)?Math.floor((Date.now()-timer.wStartTs)/1000):0)}
function fmt(sec){sec=Math.max(0,int(sec,0));return`${Math.floor(sec/60)}:${String(sec%60).padStart(2,"0")}`}
function saveTimer(){storage.setItem(LS_TIMER,JSON.stringify(timer))}
function loadTimer(){const p=safeParse(storage.getItem(LS_TIMER));if(p)timer={...timer,...p};timer.rTarget=int(timer.rTarget,state.settings.restSeconds)}
function tickWorkout(){const el=document.getElementById("workoutTime");if(el)el.textContent=fmt(workoutElapsed())}
async function toggleWorkoutTimer(){if(timer.wRunning){timer.wBase=workoutElapsed();timer.wRunning=false;timer.wStartTs=null;clearInterval(workoutInterval);workoutInterval=null;releaseWakeLock()}else{timer.wRunning=true;timer.wStartTs=Date.now();workoutInterval=setInterval(tickWorkout,1000);requestWakeLock()}saveTimer();tickWorkout()}
function resetWorkoutTimer(){clearInterval(workoutInterval);workoutInterval=null;timer.wRunning=false;timer.wBase=0;timer.wStartTs=null;saveTimer();tickWorkout();releaseWakeLock()}
function restRemaining(){return timer.rRunning&&timer.rEndTs?Math.max(0,Math.ceil((timer.rEndTs-Date.now())/1000)):timer.rTarget}
function tickRest(){const r=restRemaining(),el=document.getElementById("restTime");if(el)el.textContent=fmt(r);if(r<=0&&timer.rRunning){timer.rRunning=false;timer.rEndTs=null;clearInterval(restInterval);restInterval=null;saveTimer();if(state.settings.vibration&&navigator.vibrate)navigator.vibrate([120,80,120]);beep()}}
function startRest(seconds=timer.rTarget||state.settings.restSeconds){timer.rTarget=clamp(int(seconds,90),15,600);timer.rRunning=true;timer.rEndTs=Date.now()+timer.rTarget*1000;clearInterval(restInterval);restInterval=setInterval(tickRest,500);saveTimer();tickRest();renderWorkoutPage()}
function resetRest(){clearInterval(restInterval);restInterval=null;timer.rRunning=false;timer.rEndTs=null;saveTimer();tickRest()}
function addRest(delta){const rem=timer.rRunning?restRemaining():timer.rTarget;timer.rTarget=clamp(rem+delta,15,600);if(timer.rRunning)timer.rEndTs=Date.now()+timer.rTarget*1000;saveTimer();tickRest();renderWorkoutPage()}
function beep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.value=.15;o.start();g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);o.stop(ctx.currentTime+.5)}catch{}}
async function requestWakeLock(){if(!state.settings.wakeLock||!("wakeLock"in navigator))return;try{wakeLock=await navigator.wakeLock.request("screen")}catch{}}
function releaseWakeLock(){try{wakeLock?.release()}catch{}wakeLock=null}
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"){tickWorkout();tickRest();if(timer.wRunning)requestWakeLock()}});

function detectPRs(entries){const prs=[];Object.entries(entries).forEach(([id,e])=>{const ex=state.exercises[id],sets=e.sets.filter(s=>s.done&&s.weight>0);if(!sets.length)return;const currentE1=Math.max(...sets.map(s=>s.weight*(1+s.reps/30))),currentVol=sets.reduce((a,s)=>a+s.weight*s.reps,0);let oldE1=0,oldVol=0;state.logs.forEach(l=>{const le=l.entries?.[id];if(!le)return;const ns=normalizeLogEntry(le,ex).sets.filter(s=>s.done&&s.weight>0);if(ns.length){oldE1=Math.max(oldE1,...ns.map(s=>s.weight*(1+s.reps/30)));oldVol=Math.max(oldVol,ns.reduce((a,s)=>a+s.weight*s.reps,0))}});if(currentE1>oldE1+.1)prs.push(`${ex.name}: güç PR`);else if(currentVol>oldVol+.1)prs.push(`${ex.name}: hacim PR`)});return prs}
function finishWorkout(){const counts=workoutCounts();if(!counts.done){toast("Önce en az bir set tamamla.");return}const w=activeWorkout(),entries={},live=liveTotals();plannedExercises().forEach(ex=>{const e=getSessionEntry(ex);if(e.skipped)return;const sets=e.sets.slice(0,plannedSets(ex)).filter(s=>s.done);if(!sets.length)return;entries[ex.id]={name:ex.name,sets:sets.map(s=>({...s})),setsDone:sets.map(()=>true),weight:sets[0].weight,reps:sets[0].reps,note:e.note||"",calories:sets.reduce((a,s)=>a+setCalories(ex,s),0),volume:sets.reduce((a,s)=>a+(s.weight>0?s.weight*s.reps:0),0)}});const prs=detectPRs(entries),mins=Math.max(1,Math.round(workoutElapsed()/60));const log={id:uid(),date:trDate(),dateISO:localISO(),time:trTime(),ts:Date.now(),workoutId:w.id,workoutName:w.name,mode:session.mode,duration:mins,totalCalories:live.cal,totalVolume:live.volume,entries,prs};state.logs.push(log);state.settings.activeWorkoutId=nextWorkout().id;saveState();resetSession();resetWorkoutTimer();resetRest();renderAll();showSummary(log,prs)}
function showSummary(log,prs){const suggestions=Object.keys(log.entries).map(id=>{const p=progression(state.exercises[id]);return p.status==="Artır"?`${state.exercises[id].name}: ${p.weight} kg`:null}).filter(Boolean);document.getElementById("summaryModalBody").innerHTML=`<div class="summary-hero"><div class="summary-check">✓</div><div class="summary-title">${esc(log.workoutName)} kaydedildi</div><div class="summary-sub">${log.duration} dk · ${Object.values(log.entries).reduce((a,e)=>a+e.sets.length,0)} set · ${Math.round(log.totalVolume)} kg hacim</div></div>${prs.length?`<div class="panel"><div class="mode-title">🏆 Yeni rekor</div>${prs.map(p=>`<div class="insight">${esc(p)}</div>`).join("")}</div>`:""}${suggestions.length?`<div class="panel"><div class="mode-title">Sonraki seans önerileri</div>${suggestions.map(p=>`<div class="insight">${esc(p)}</div>`).join("")}</div>`:""}<div class="modal-actions"><button class="btn ghost" onclick="closeSummary()">Kapat</button><button class="btn primary" onclick="goPostWorkoutCardio()">20 dk yürüyüş ekle</button></div>`;document.getElementById("summaryModal").classList.add("open")}
function closeSummary(){document.getElementById("summaryModal").classList.remove("open")}
function goPostWorkoutCardio(){closeSummary();showTab("cardio");setTimeout(()=>applyCardioPreset(20,5,2),0)}

function weekLogs(){const s=startOfWeek();return state.logs.filter(l=>parseDateValue(l.dateISO||l.date,l.ts)>=s)}
function weekCardio(){const s=startOfWeek();return state.cardioLog.filter(c=>parseDateValue(c.dateISO||c.date,c.ts)>=s)}
function muscleGroup(ex){const txt=[ex.name,...(ex.muscles||[])].join(" ").toLowerCase();if(/göğüs|chest|press/.test(txt)&&!/shoulder|omuz/.test(txt))return"Göğüs";if(/sırt|row|pulldown|lat|back/.test(txt))return"Sırt";if(/omuz|shoulder|lateral/.test(txt))return"Omuz";if(/biceps|triceps|curl|kol|pushdown/.test(txt))return"Kol";if(/bacak|leg|hamstring|quadriceps|kalça/.test(txt))return"Bacak";if(/core|plank|karın/.test(txt))return"Core";return"Diğer"}
function weeklyMuscles(){const out={Göğüs:0,Sırt:0,Omuz:0,Kol:0,Bacak:0,Core:0};weekLogs().forEach(l=>Object.entries(l.entries||{}).forEach(([id,e])=>{const g=muscleGroup(state.exercises[id]||{name:e.name,muscles:[]});out[g]=(out[g]||0)+normalizeLogEntry(e,state.exercises[id]).sets.filter(s=>s.done).length}));return out}
function coachInsights(){const wl=weekLogs(),wc=weekCardio(),mins=wc.reduce((a,c)=>a+num(c.duration,0),0),out=[];const left=Math.max(0,state.settings.weeklyWorkoutTarget-wl.length);out.push(left?`Haftalık hedefe <b>${left} antrenman</b> kaldı.`:`Haftalık antrenman hedefi tamamlandı.`);const cLeft=Math.max(0,state.settings.weeklyCardioTarget-mins);out.push(cLeft?`Kardiyo hedefinde <b>${cLeft} dakika</b> kaldı.`:`Kardiyo hedefi tamamlandı.`);const m=weeklyMuscles(),vals=Object.entries(m).filter(([,v])=>v>0).sort((a,b)=>a[1]-b[1]);if(vals.length>=3&&vals.at(-1)[1]>=vals[0][1]*2.5)out.push(`<b>${vals[0][0]}</b> bu hafta diğer gruplara göre geride kalmış görünüyor.`);if(!state.logs.length)out.push("İlk iki haftada amaç kusursuzluk değil, düzenli veri biriktirmek.");return out}
function weightChart(){const arr=state.bodyWeightLog.slice(-12);if(arr.length<2)return`<div class="empty" style="padding:18px">En az iki kilo kaydı girince trend oluşur.</div>`;const w=320,h=105,p=12,vals=arr.map(x=>x.weight),min=Math.min(...vals)-.5,max=Math.max(...vals)+.5,range=max-min||1;const pts=vals.map((v,i)=>`${p+i*(w-2*p)/(vals.length-1)},${p+(max-v)*(h-2*p)/range}`).join(" ");return`<div class="chart"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="3" vector-effect="non-scaling-stroke"/>${vals.map((v,i)=>{const [x,y]=pts.split(" ")[i].split(",");return`<circle cx="${x}" cy="${y}" r="3" fill="var(--accent)"/>`}).join("")}</svg></div><div class="chart-label">${vals[0]} kg → ${vals.at(-1)} kg · değişim ${(vals.at(-1)-vals[0]).toFixed(1)} kg</div>`}
function renderAnalysis(){const el=document.getElementById("analysisContent"),wl=weekLogs(),wc=weekCardio(),sets=wl.reduce((a,l)=>a+Object.values(l.entries||{}).reduce((s,e)=>s+normalizeLogEntry(e).sets.filter(x=>x.done).length,0),0),mins=wc.reduce((a,c)=>a+num(c.duration,0),0),steps=wc.reduce((a,c)=>a+int(c.steps,0),0),muscles=weeklyMuscles(),maxM=Math.max(1,...Object.values(muscles));const prs=state.logs.slice().reverse().flatMap(l=>(l.prs||[]).map(p=>({p,date:l.date}))).slice(0,8);el.innerHTML=`<div class="sum-grid"><div class="sum-card"><div class="sum-n">${wl.length}/${state.settings.weeklyWorkoutTarget}</div><div class="sum-l">Bu hafta antrenman</div></div><div class="sum-card"><div class="sum-n">${sets}</div><div class="sum-l">Çalışma seti</div></div><div class="sum-card"><div class="sum-n">${mins}</div><div class="sum-l">Kardiyo dakika</div></div><div class="sum-card"><div class="sum-n">${steps.toLocaleString("tr-TR")}</div><div class="sum-l">Kayıtlı adım</div></div></div><div class="panel"><div class="week-goal"><strong>Haftalık tempo</strong><span>${wl.length}/${state.settings.weeklyWorkoutTarget}</span></div><div class="bar"><i style="width:${Math.min(100,wl.length/state.settings.weeklyWorkoutTarget*100)}%"></i></div></div><div class="sect">Koç özeti</div><div class="panel">${coachInsights().map(x=>`<div class="insight">${x}</div>`).join("")}</div><div class="sect">Kas grubu dağılımı</div><div class="panel">${Object.entries(muscles).map(([k,v])=>`<div class="muscle-row"><div class="muscle-name">${k}</div><div class="muscle-bar"><i style="width:${v/maxM*100}%"></i></div><div class="muscle-count">${v}</div></div>`).join("")}<div class="mode-note">Sayılar bu hafta kaydettiğin çalışma setlerini gösterir; tıbbi veya mutlak ideal değildir.</div></div><div class="sect">Kilo trendi</div><div class="panel">${weightChart()}</div><div class="sect">Son rekorlar</div><div class="panel">${prs.length?prs.map(x=>`<div class="pr"><span>${esc(x.p)}</span><strong>${esc(x.date)}</strong></div>`).join(""):`<div class="empty" style="padding:18px">Henüz PR oluşmadı.</div>`}</div>`}

function renderHistory(){const el=document.getElementById("historyContent"),logs=state.logs.slice().reverse();if(!logs.length){el.innerHTML=`<div class="empty">Henüz antrenman kaydı yok.</div>`;return}el.innerHTML=logs.map(l=>{const exs=Object.entries(l.entries||{}).map(([id,e])=>{const n=normalizeLogEntry(e,state.exercises[id]),sets=n.sets.filter(s=>s.done);return`<div class="log-ex"><strong>${esc(e.name||state.exercises[id]?.name||id)}</strong><br>${sets.map((s,i)=>`${i+1}. set: ${s.weight||"Vücut"} ${s.weight?"kg · ":""}${s.reps} ${state.exercises[id]?.type==="core"?"sn":"tekrar"} · RIR ${s.rir??"—"}`).join("<br>")}</div>`}).join("");return`<div class="wi"><div class="wi-top"><div class="wi-title">${esc(l.date)} · ${esc(l.workoutName)}</div><div class="wi-meta">${l.duration||"?"} dk<br>${Math.round(l.totalVolume||0)} kg</div></div><div class="wi-body">${exs}</div><div class="btn-row" style="margin-top:8px"><button class="btn danger" onclick="deleteLog('${l.id}')">Kaydı sil</button></div></div>`}).join("")}
function deleteLog(id){if(!confirmAction("Bu antrenman kaydı silinsin mi?"))return;state.logs=state.logs.filter(l=>l.id!==id);saveState();renderHistory();toast("Kayıt silindi")}

function walkKcal(weight,speed,incline,minutes){const sm=speed*1000/60,grade=incline/100,vo2=.1*sm+1.8*sm*grade+3.5;return Math.max(0,vo2*weight/1000*5*minutes)}
function applyCardioPreset(d,s,i){document.getElementById("cDuration").value=d;document.getElementById("cSpeed").value=s;document.getElementById("cIncline").value=i}
function addCardio(){const duration=num(document.getElementById("cDuration").value),speed=num(document.getElementById("cSpeed").value),incline=num(document.getElementById("cIncline").value,0),steps=int(document.getElementById("cSteps").value,0),weight=state.settings.bodyWeightKg;if(!duration||!speed){toast("Süre ve hız gerekli.");return}const kcal=Math.round(walkKcal(weight,speed,incline,duration));state.cardioLog.push({id:uid(),date:trDate(),dateISO:localISO(),time:trTime(),ts:Date.now(),duration,speed,incline,steps,weight,kcal});saveState();renderCardio();toast(`${kcal} kcal tahminiyle kaydedildi`)}
function deleteCardio(id){if(!confirmAction("Bu kardiyo kaydı silinsin mi?"))return;state.cardioLog=state.cardioLog.filter(x=>x.id!==id);saveState();renderCardio()}
function renderCardio(){const el=document.getElementById("cardioContent"),week=weekCardio(),mins=week.reduce((a,c)=>a+num(c.duration,0),0),steps=week.reduce((a,c)=>a+int(c.steps,0),0),kcal=week.reduce((a,c)=>a+num(c.kcal,0),0);el.innerHTML=`<div class="sum-grid"><div class="sum-card"><div class="sum-n">${mins}</div><div class="sum-l">Haftalık dakika</div></div><div class="sum-card"><div class="sum-n">${Math.round(kcal)}</div><div class="sum-l">Tahmini kcal</div></div><div class="sum-card"><div class="sum-n">${steps.toLocaleString("tr-TR")}</div><div class="sum-l">Adım</div></div><div class="sum-card"><div class="sum-n">${state.settings.weeklyCardioTarget}</div><div class="sum-l">Hedef dakika</div></div></div><div class="panel"><div class="week-goal"><strong>Kardiyo hedefi</strong><span>${mins}/${state.settings.weeklyCardioTarget} dk</span></div><div class="bar"><i style="width:${Math.min(100,mins/state.settings.weeklyCardioTarget*100)}%"></i></div></div><div class="sect">Hızlı yürüyüş</div><div class="presets"><button class="preset" onclick="applyCardioPreset(20,5,2)">20 dk · 5 hız · %2</button><button class="preset" onclick="applyCardioPreset(30,5,2)">30 dk · 5 hız · %2</button><button class="preset" onclick="applyCardioPreset(45,5,2)">45 dk · 5 hız · %2</button><button class="preset" onclick="applyCardioPreset(60,5,2)">60 dk · 5 hız · %2</button></div><div class="panel"><div class="form-grid"><div class="field"><label>Süre (dk)</label><input class="inp" id="cDuration" type="number" inputmode="numeric"></div><div class="field"><label>Hız (km/s)</label><input class="inp" id="cSpeed" type="number" inputmode="decimal" value="5"></div><div class="field"><label>Eğim (%)</label><input class="inp" id="cIncline" type="number" inputmode="decimal" value="2"></div><div class="field"><label>Adım — opsiyonel</label><input class="inp" id="cSteps" type="number" inputmode="numeric"></div></div><button class="btn primary" style="width:100%" onclick="addCardio()">Kardiyoyu Kaydet</button><div class="mode-note">Kalori, hız-eğim-kilo denkleminden çıkan yaklaşık değerdir.</div></div><div class="sect">Kayıtlar</div>${state.cardioLog.slice().reverse().map(c=>`<div class="wi"><div class="wi-top"><div class="wi-title">${esc(c.date)} · ${esc(c.time||"")}</div><div class="wi-meta">${c.duration} dk · ${c.kcal} kcal</div></div><div class="wi-body">${c.speed} km/s · %${c.incline||0} eğim${c.steps?` · ${c.steps.toLocaleString("tr-TR")} adım`:""}</div><button class="btn danger" style="margin-top:7px" onclick="deleteCardio('${c.id}')">Sil</button></div>`).join("")||`<div class="empty">Henüz kardiyo kaydı yok.</div>`}`}

function programAudit(){const out={Ana:0,Yardımcı:0,Core:0,Opsiyonel:0};Object.values(state.exercises).forEach(x=>{if(x.type==="main")out.Ana++;else if(x.type==="core")out.Core++;else out.Yardımcı++;if(x.optional)out.Opsiyonel++});return out}
function smartOptimizeProgram(){if(!confirmAction("Mevcut ağırlıklar ve geçmiş korunacak. Set/tekrar aralıkları, dinlenme ve hareket rolleri v5.6 mantığına göre düzenlensin mi?"))return;storage.setItem(`${LS_STATE}_program_oncesi_${Date.now()}`,JSON.stringify(state));state.workouts.forEach(w=>workoutExercises(w).forEach((x,i)=>{const n=x.name.toLowerCase();x.type=inferType(x);if(/chest press|incline|shoulder press|pulldown|rowing|cable row|leg press/.test(n))x.type="main";if(/plank/.test(n))x.type="core";if(x.type==="main"){x.sets=Math.max(3,x.sets);x.repMin=8;x.repMax=10;x.restSec=120;x.increment=x.weight<=20?1:2.5;x.optional=false}else if(x.type==="core"){x.sets=clamp(x.sets,2,3);x.repMin=Math.max(20,x.repMin);x.repMax=Math.max(40,x.repMax);x.restSec=60;x.optional=true}else{x.sets=clamp(x.sets,2,3);x.repMin=10;x.repMax=15;x.restSec=75;x.increment=x.weight<=20?1:2.5;x.optional=i>=3}x.reps=x.repMax}));saveState();resetSession();renderAll();toast("Program akıllı aralıklara uyarlandı")}
function addWorkout(){const inp=document.getElementById("newWorkoutName"),name=inp.value.trim();if(!name){toast("Antrenman adı gir.");return}state.workouts.push({id:uid(),name,exerciseIds:[]});saveState();renderManage()}
function renameWorkout(id){const w=state.workouts.find(x=>x.id===id);if(!w)return;openActionModal({title:"Antrenmanın adını değiştir",message:"Yeni adı yazıp kaydet.",inputValue:w.name,inputLabel:"Antrenman adı",confirmText:"Kaydet",onConfirm:name=>{w.name=name;saveState();renderAll();toast("Antrenman adı güncellendi")}})}
function deleteWorkout(id){if(state.workouts.length<=1){toast("En az bir antrenman kalmalı.");return}const w=state.workouts.find(x=>x.id===id);if(!w)return;openActionModal({title:"Antrenmanı sil",message:`${w.name} ve içindeki hareketler silinecek. Geçmiş kayıtlar korunur.`,confirmText:"Sil",danger:true,onConfirm:()=>{w.exerciseIds.forEach(x=>delete state.exercises[x]);state.workouts=state.workouts.filter(x=>x.id!==id);if(state.settings.activeWorkoutId===id)state.settings.activeWorkoutId=state.workouts[0].id;saveState();resetSession();renderAll();toast("Antrenman silindi")}})}
function setActiveWorkout(id){if(id===state.settings.activeWorkoutId)return;const done=Object.values(session.data||{}).some(e=>e.sets?.some(s=>s.done));if(done&&!confirmAction("Devam eden setler temizlenecek. Antrenman değişsin mi?")){renderHeader();return}state.settings.activeWorkoutId=id;saveState();resetSession();resetWorkoutTimer();renderAll()}
function cycleWorkout(){setActiveWorkout(nextWorkout().id)}
function moveExercise(wId,exId,dir){const w=state.workouts.find(x=>x.id===wId),i=w.exerciseIds.indexOf(exId),j=i+dir;if(j<0||j>=w.exerciseIds.length)return;[w.exerciseIds[i],w.exerciseIds[j]]=[w.exerciseIds[j],w.exerciseIds[i]];saveState();renderAll()}
function deleteExercise(wId,exId){const x=state.exercises[exId],w=state.workouts.find(x=>x.id===wId);if(!x||!w)return;openActionModal({title:"Hareketi sil",message:`${x.name} bu antrenmandan silinecek.`,confirmText:"Sil",danger:true,onConfirm:()=>{w.exerciseIds=w.exerciseIds.filter(id=>id!==exId);delete state.exercises[exId];delete session.data[exId];saveState();saveSession();renderAll();toast("Hareket silindi")}})}
function openExerciseModal(wId,exId=null){modalCtx={workoutId:wId,exerciseId:exId};const x=exId?state.exercises[exId]:null;document.getElementById("exerciseModalTitle").textContent=x?"Hareketi Düzenle":"Hareket Ekle";const map={fName:x?.name||"",fMuscles:(x?.muscles||[]).join(", "),fWeight:x?.weight??"",fSets:x?.sets??3,fRepMin:x?.repMin??10,fRepMax:x?.repMax??15,fType:x?.type||"accessory",fIncrement:x?.increment??2.5,fRest:x?.restSec??75,fCal:x?.calPerSet??"",fVideo:x?.video||"",fNote:x?.note||""};Object.entries(map).forEach(([id,v])=>document.getElementById(id).value=v);document.getElementById("fOptional").checked=!!x?.optional;document.getElementById("exerciseModal").classList.add("open")}
function closeExerciseModal(){document.getElementById("exerciseModal").classList.remove("open")}
function saveExerciseModal(){const name=document.getElementById("fName").value.trim();if(!name){toast("Hareket adı zorunlu.");return}const data={name,muscles:document.getElementById("fMuscles").value.split(",").map(x=>x.trim()).filter(Boolean),weight:num(document.getElementById("fWeight").value,0),sets:clamp(int(document.getElementById("fSets").value,3),1,10),repMin:clamp(int(document.getElementById("fRepMin").value,10),1,999),repMax:clamp(int(document.getElementById("fRepMax").value,15),1,999),type:document.getElementById("fType").value,increment:num(document.getElementById("fIncrement").value,2.5),restSec:clamp(int(document.getElementById("fRest").value,75),15,600),calPerSet:num(document.getElementById("fCal").value,null),video:document.getElementById("fVideo").value.trim(),note:document.getElementById("fNote").value.trim(),optional:document.getElementById("fOptional").checked};if(data.repMax<data.repMin)[data.repMin,data.repMax]=[data.repMax,data.repMin];data.reps=data.repMax;if(modalCtx.exerciseId)Object.assign(state.exercises[modalCtx.exerciseId],data);else{const id=uid();state.exercises[id]={id,...data};state.workouts.find(x=>x.id===modalCtx.workoutId).exerciseIds.push(id)}saveState();closeExerciseModal();renderAll();toast("Hareket kaydedildi")}
function logBodyWeight(){const v=num(document.getElementById("bodyWeightInput").value);if(!v||v<40||v>300){toast("Geçerli kilo gir.");return}state.settings.bodyWeightKg=v;state.bodyWeightLog.push({id:uid(),date:trDate(),dateISO:localISO(),ts:Date.now(),weight:v});saveState();renderManage();toast(`${v} kg kaydedildi`)}
function updateSetting(key,v){if(["weeklyWorkoutTarget","weeklyCardioTarget","restSeconds"].includes(key))v=int(v,state.settings[key]);if(key==="bodyWeightKg")v=num(v,state.settings[key]);state.settings[key]=v;saveState();renderAll()}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`antrenman-yedek-${localISO()}.json`;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),2000)}
function importFile(input){const f=input.files?.[0];if(!f)return;const r=new FileReader();r.onload=()=>{const p=safeParse(String(r.result));if(!p||!Array.isArray(p.workouts)){toast("Geçersiz yedek.");return}if(!confirmAction("Mevcut veri yedekle değiştirilsin mi?"))return;storage.setItem(`${LS_STATE}_ice_aktarim_oncesi_${Date.now()}`,JSON.stringify(state));state=migrateState(p);saveState();resetSession();renderAll();toast("Yedek yüklendi")};r.readAsText(f);input.value=""}
function renderManage(){const a=programAudit(),el=document.getElementById("manageContent");el.innerHTML=`<div class="sect">Kişisel ayarlar</div><div class="mw"><div class="form-grid"><div class="field"><label>Güncel kilo (kg)</label><input class="inp" id="bodyWeightInput" type="number" inputmode="decimal" value="${state.settings.bodyWeightKg}"></div><div class="field" style="display:flex;align-items:end"><button class="btn primary" style="width:100%" onclick="logBodyWeight()">Kiloyu Kaydet</button></div><div class="field"><label>Haftalık antrenman hedefi</label><input class="inp" type="number" value="${state.settings.weeklyWorkoutTarget}" onchange="updateSetting('weeklyWorkoutTarget',this.value)"></div><div class="field"><label>Haftalık kardiyo (dk)</label><input class="inp" type="number" value="${state.settings.weeklyCardioTarget}" onchange="updateSetting('weeklyCardioTarget',this.value)"></div><div class="field"><label>Varsayılan mod</label><select class="inp" onchange="updateSetting('defaultMode',this.value)">${Object.entries(MODE_INFO).map(([k,v])=>`<option value="${k}" ${state.settings.defaultMode===k?"selected":""}>${v.label}</option>`).join("")}</select></div><div class="field"><label>Varsayılan dinlenme</label><input class="inp" type="number" value="${state.settings.restSeconds}" onchange="updateSetting('restSeconds',this.value)"></div></div><label class="checkline"><input type="checkbox" ${state.settings.vibration?"checked":""} onchange="updateSetting('vibration',this.checked)"> Dinlenme sonunda titreşim</label><label class="checkline" style="margin-top:8px"><input type="checkbox" ${state.settings.wakeLock?"checked":""} onchange="updateSetting('wakeLock',this.checked)"> Antrenmanda ekranı açık tut</label></div><div class="sect">Program zekâsı</div><div class="mw"><div class="audit-grid"><div class="audit"><strong>${a.Ana}</strong><span>Ana</span></div><div class="audit"><strong>${a.Yardımcı}</strong><span>Yardımcı</span></div><div class="audit"><strong>${a.Core}</strong><span>Core</span></div></div><div class="mode-note">Ana hareket: 8–10 tekrar / 120 sn. Yardımcı: 10–15 tekrar / 75 sn. Mevcut ağırlıkların korunur.</div><button class="btn primary" style="width:100%;margin-top:10px" onclick="smartOptimizeProgram()">Mevcut Programı v5.6 Mantığına Uyarla</button></div><div class="sect">Yeni antrenman</div><div class="btn-row"><input class="inp" id="newWorkoutName" placeholder="Örn: Seans C"><button class="btn primary" onclick="addWorkout()">+ Ekle</button></div><div class="sect">Antrenmanlarım</div>${state.workouts.map(w=>`<div class="mw ${w.id===activeWorkout().id?"active":""}"><div class="mw-head"><div class="mw-name">${esc(w.name)} ${w.id===activeWorkout().id?`<span class="tag green">AKTİF</span>`:""}</div><div class="mw-actions">${w.id!==activeWorkout().id?`<button type="button" class="icon-btn" title="Aktif yap" aria-label="Aktif yap" onclick="setActiveWorkout('${w.id}')">${ICONS.play}</button>`:""}<button type="button" class="icon-btn" title="Adını değiştir" aria-label="Adını değiştir" onclick="renameWorkout('${w.id}')">${ICONS.edit}</button><button type="button" class="icon-btn danger" title="Antrenmanı sil" aria-label="Antrenmanı sil" onclick="deleteWorkout('${w.id}')">${ICONS.trash}</button></div></div>${workoutExercises(w).map(x=>`<div class="mex"><div><div class="mex-name">${esc(x.name)}</div><div class="mex-meta">${x.sets}×${x.repMin}–${x.repMax} · ${x.type==="main"?"Ana":x.type==="core"?"Core":"Yardımcı"} · ${x.restSec} sn</div></div><div class="mw-actions"><button type="button" class="icon-btn" title="Yukarı taşı" aria-label="Yukarı taşı" onclick="moveExercise('${w.id}','${x.id}',-1)">${ICONS.up}</button><button type="button" class="icon-btn" title="Aşağı taşı" aria-label="Aşağı taşı" onclick="moveExercise('${w.id}','${x.id}',1)">${ICONS.down}</button><button type="button" class="icon-btn" title="Hareketi düzenle" aria-label="Hareketi düzenle" onclick="openExerciseModal('${w.id}','${x.id}')">${ICONS.edit}</button><button type="button" class="icon-btn danger" title="Hareketi sil" aria-label="Hareketi sil" onclick="deleteExercise('${w.id}','${x.id}')">${ICONS.trash}</button></div></div>`).join("")||`<div class="empty" style="padding:15px">Hareket yok.</div>`}<button class="addex" onclick="openExerciseModal('${w.id}')">+ Hareket Ekle</button></div>`).join("")}<div class="sect">Veri güvenliği</div><div class="mw"><div class="btn-row"><button class="btn primary" onclick="exportData()">Yedek İndir</button><button class="btn ghost" onclick="document.getElementById('importInput').click()">Yedek Yükle</button></div><input id="importInput" type="file" accept="application/json,.json" style="display:none" onchange="importFile(this)"><div class="mode-note">Uygulama güncellenirken verilerin aynı alan adında localStorage içinde kalır. Yine de ara sıra yedek indir.</div></div>`}

function renderHeader(){document.getElementById("dateText").textContent=new Date().toLocaleDateString("tr-TR",{weekday:"long",day:"numeric",month:"long"});const sel=document.getElementById("workoutSelect");sel.innerHTML=state.workouts.map(w=>`<option value="${w.id}" ${w.id===activeWorkout().id?"selected":""}>${esc(w.name)}</option>`).join("");sel.onchange=e=>setActiveWorkout(e.target.value);document.getElementById("nextWorkout").textContent=nextWorkout()?.name||"—"}
function showTab(name){currentTab=name;document.querySelectorAll(".page").forEach(p=>p.classList.toggle("on",p.id===`page-${name}`));document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.tab===name));if(name==="history")renderHistory();if(name==="analysis")renderAnalysis();if(name==="cardio")renderCardio();if(name==="manage")renderManage();window.scrollTo({top:0,behavior:"smooth"})}
function renderAll(){renderHeader();renderWorkoutPage();if(currentTab==="history")renderHistory();if(currentTab==="analysis")renderAnalysis();if(currentTab==="cardio")renderCardio();if(currentTab==="manage")renderManage()}
function init(){loadState();loadSession();loadTimer();timer.rTarget=timer.rTarget||state.settings.restSeconds;tickWorkout();tickRest();if(timer.wRunning)workoutInterval=setInterval(tickWorkout,1000);if(timer.rRunning)restInterval=setInterval(tickRest,500);document.getElementById("exerciseModal").addEventListener("click",e=>{if(e.target.id==="exerciseModal")closeExerciseModal()});document.getElementById("summaryModal").addEventListener("click",e=>{if(e.target.id==="summaryModal")closeSummary()});document.getElementById("actionModal").addEventListener("click",e=>{if(e.target.id==="actionModal")closeActionModal()});document.getElementById("actionModalInput").addEventListener("keydown",e=>{if(e.key==="Enter")confirmActionModal()});renderAll()}

function setupServiceWorker(){if(!("serviceWorker"in navigator))return;navigator.serviceWorker.register("sw.js").then(reg=>{reg.update();if(reg.waiting){pendingWorker=reg.waiting;document.getElementById("updateBanner").classList.add("show")}reg.addEventListener("updatefound",()=>{const nw=reg.installing;nw?.addEventListener("statechange",()=>{if(nw.state==="installed"&&navigator.serviceWorker.controller){pendingWorker=nw;document.getElementById("updateBanner").classList.add("show")}})})}).catch(()=>{});navigator.serviceWorker.addEventListener("controllerchange",()=>location.reload())}
function activateUpdate(){pendingWorker?.postMessage({type:"SKIP_WAITING"})}
init();window.addEventListener("load",setupServiceWorker);
</script>
</body>
</html>
